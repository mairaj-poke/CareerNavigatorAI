workflows:
  expo-android:
    name: Expo Android Build
    max_build_duration: 60

    environment:
      node: 18

    scripts:
      # Install dependencies
      - npm install
      - npm install -g eas-cli@latest

      # Verify token exists
      - echo "Token exists"

      # Build Android APK
      - eas build --platform android --profile preview --non-interactive

    artifacts:
      - build/**/*
